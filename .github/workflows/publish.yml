name: Publish Package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      packages: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 2  # needed to access previous commit

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'
        
    - name: Get current version
      id: current
      run: |
        VERSION=$(node -p "require('./packages/othellog/package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Get previous version
      id: previous
      run: |
        VERSION=$(git show HEAD~1:packages/othellog/package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Check if version changed
      id: version_check
      run: |
        if [ "${{ steps.current.outputs.version }}" = "${{ steps.previous.outputs.version }}" ]; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Publish to GitHub Packages
      if: steps.version_check.outputs.changed == 'true'
      working-directory: ./packages/othellog
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm publish
      
    - name: Skip message
      if: steps.version_check.outputs.changed == 'false'
      run: echo "Version unchanged. Skipping publish."