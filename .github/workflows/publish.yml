name: Publish Package

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        registry-url: 'https://npm.pkg.github.com'

    - name: Minor Update
      working-directory: ./packages/othellog
      run: npm version patch
      
    - name: Commit version
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.email "s.hanke1316@gmail.com"
        git config --global user.name "Github Actions"
        git add ./packages/othellog/package.json
        git commit -m 'publish patch [skip ci]'
        git push

    - name: Publish to GitHub Packages
      working-directory: ./packages/othellog
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm publish